name: pulse
description: >
  Pulse - Real-time local event intelligence with AI-powered summaries.
  Users submit short reports about what's happening in their area, and our
  AI instantly creates concise summaries of local events.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.15.0
  firebase_storage: ^11.5.0

  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.4.3

  # State Management
  provider: ^6.0.0

  # UI
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5
  intl: ^0.19.0

  # HTTP
  http: ^1.1.0

  # Local Storage for offline
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0

  # Utils
  uuid: ^4.0.0
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
